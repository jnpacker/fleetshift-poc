version: v2
modules:
  - path: proto
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate
lint:
  except:
    # AIP-131/133: standard Get and Create methods return the resource directly,
    # not a dedicated response wrapper.
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # FleetletService uses Event/Instruction naming for bidirectional streams
    # where the "requester" is sometimes the server (delivery).
    - RPC_REQUEST_STANDARD_NAME

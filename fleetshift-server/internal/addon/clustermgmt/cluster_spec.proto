syntax = "proto3";

package addons.cluster_mgmt.v1;

import "buf/validate/validate.proto";

// ClusterSpec is the addon-defined spec for a managed cluster resource.
// Provided by the cluster management addon with protovalidate annotations
// that the platform enforces at the API boundary.
message ClusterSpec {
  // Infrastructure provider for the cluster.
  string provider = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {in: ["rosa", "aro", "hypershift", "assisted-installer"]}
  ];

  // OpenShift version (semver-like: 4.x.y).
  string version = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^4\\.[0-9]+\\.[0-9]+$"
  ];

  // Cloud region for deployment.
  string region = 3 [(buf.validate.field).required = true];

  // Compute pools for the cluster.
  repeated ComputePool compute_pools = 4;

  // Network configuration.
  NetworkConfig network = 5;
}

// ComputePool defines a pool of worker nodes.
message ComputePool {
  string name = 1 [(buf.validate.field).required = true];
  int32 replicas = 2 [(buf.validate.field).int32 = {gte: 1, lte: 100}];
  string instance_type = 3 [(buf.validate.field).required = true];
}

// NetworkConfig holds cluster networking settings.
message NetworkConfig {
  string pod_cidr = 1;
  string service_cidr = 2;
}
